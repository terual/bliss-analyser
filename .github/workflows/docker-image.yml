name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Triggers on push to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Unpack Release
        run: |
          curl -L https://github.com/CDrummond/bliss-analyser/releases/download/0.5.2/bliss-analyser-linux-x86-ffmpeg-0.5.2.zip -o release.zip
          unzip release.zip -d .
          rm release.zip

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # Enables multi-platform builds

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: . # Current directory as build context
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bliss-analyser:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bliss-analyser:${{ github.sha }}
